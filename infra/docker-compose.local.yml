# ##############################################################################
# wikicells — local-only override
#
# Used together with the base compose file for a localhost dry-run:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.local.yml up -d
#
# What this changes vs. production:
#   - Traefik runs on HTTP only (port 80), with no Let's Encrypt and no
#     HTTPS redirect. TLS is not exercised by the local run.
#   - All MediaWiki / WDQS / QuickStatements public URLs are flipped from
#     https:// to http://, so the wiki doesn't issue HTTPS-redirect responses
#     the browser can't follow on localhost.
#
# Production should always use the base file alone. Never add this override
# to a real deployment — it disables TLS.
# ##############################################################################

services:
  wikibase:
    environment:
      MW_WG_SERVER: http://${WIKIBASE_PUBLIC_HOST}
      QUICKSTATEMENTS_PUBLIC_URL: http://${WIKIBASE_PUBLIC_HOST}/tools/quickstatements
      WDQS_PUBLIC_ENDPOINT_URL: http://${WDQS_PUBLIC_HOST}/sparql
      WDQS_PUBLIC_FRONTEND_URL: http://${WDQS_PUBLIC_HOST}

  wdqs-updater:
    environment:
      WIKIBASE_CONCEPT_URI: http://${WIKIBASE_PUBLIC_HOST}

  wdqs-frontend:
    environment:
      WDQS_PUBLIC_URL: http://${WDQS_PUBLIC_HOST}/sparql
      WIKIBASE_PUBLIC_URL: http://${WIKIBASE_PUBLIC_HOST}/w/api.php

  quickstatements:
    environment:
      QUICKSTATEMENTS_PUBLIC_URL: http://${WIKIBASE_PUBLIC_HOST}/tools/quickstatements
      WIKIBASE_PUBLIC_URL: http://${WIKIBASE_PUBLIC_HOST}

  traefik:
    # `command` is fully replaced by Compose when present in an override
    # file, so this is the complete Traefik invocation for local mode.
    # Note: the base file's `ports: 80:80, 443:443` is preserved (Compose
    # merges list fields). Nothing answers on 443 in local mode — harmless.
    command:
      - "--accesslog.format=common"
      - "--entrypoints.web.address=:80"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
