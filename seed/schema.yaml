# Schema for the wikicells seed.
#
# Loaded by bots/seed_load.py before the data rows. Each property and class
# item is created in the local Wikibase instance and assigned a P-ID or Q-ID;
# subsequent references in open-questions.tsv use the `id_alias` below to
# resolve to the assigned IDs.
#
# Federated Properties is disabled (see infra/config/Extensions.php section
# 2). "Instance of" is therefore a local property — P_instance_of — rather
# than Wikidata's P31. Wikidata cross-references, when needed, are stored as
# URL values.

# ------------------------------------------------------------------------------
# Local properties (for the open-questions table)
# ------------------------------------------------------------------------------

properties:
  - id_alias: P_instance_of
    datatype: wikibase-item
    labels:
      en: instance of
    descriptions:
      en: the class that this item is a member of (local equivalent of Wikidata's P31)
    aliases:
      en: [is a, type]

  - id_alias: P_status
    datatype: wikibase-item
    labels:
      en: status
    descriptions:
      en: decision status of an open question
    aliases:
      en: [resolution status]

  - id_alias: P_decision
    datatype: monolingualtext
    labels:
      en: decision
    descriptions:
      en: the resolution chosen for this question
    aliases:
      en: [resolution]

  - id_alias: P_decided_by
    datatype: string
    labels:
      en: decided by
    descriptions:
      en: actor (user, role, or group) who made the decision
    aliases:
      en: [resolved by, decided by user]

  - id_alias: P_decided_when
    datatype: time
    labels:
      en: decided when
    descriptions:
      en: date the decision was reached
    aliases:
      en: [resolution date]

  - id_alias: P_rationale_link
    datatype: url
    labels:
      en: rationale link
    descriptions:
      en: URL to a page, commit, or discussion explaining the decision

# ------------------------------------------------------------------------------
# Class items (categories that local items are "instance of")
# ------------------------------------------------------------------------------
#
# Membership is asserted with the local P_instance_of property defined above.

class_items:
  - id_alias: Q_class_decision
    labels:
      en: Architectural decision
    descriptions:
      en: a decision recorded in the wikicells open-questions log
    statements: []

# ------------------------------------------------------------------------------
# Status items (values referenced by P_status)
# ------------------------------------------------------------------------------

status_items:
  - id_alias: Q_status_decided
    labels:
      en: decided
    descriptions:
      en: question has a chosen resolution

  - id_alias: Q_status_open
    labels:
      en: open
    descriptions:
      en: question is unresolved and awaiting input

  - id_alias: Q_status_deferred
    labels:
      en: deferred
    descriptions:
      en: question is deliberately postponed to a later phase
